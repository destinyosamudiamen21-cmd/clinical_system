<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo clinic</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="icon" href="data:," />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-primary px-4">
      <span class="navbar-brand fw-bold">Demo clinic</span>
      <a href="/" class="btn btn-outline-light btn-sm">dashboard</a>
    </nav>

    <div class="container mt-4">
      <div
        class="card mb-4 border-0 shadow-sm"
        style="
          background: linear-gradient(135deg, #1a73e8, #0d47a1);
          color: white;
        "
      >
        <div
          class="card-body d-flex justify-content-between align-items-center"
        >
          <div>
            <p class="mb-0 opacity-75">Today's Appointments</p>
            <h1 id="todayCount" class="mb-0 fw-bold">0</h1>
          </div>
          <div id="todayList" class="text-end small"></div>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Appointments</h2>
        <button
          class="btn btn-success"
          data-bs-toggle="modal"
          data-bs-target="#bookModal"
        >
          <i class="bi bi-calendar-plus-fill me-2"></i>Book Appointment
        </button>
      </div>

      <input
        type="text"
        id="search-input"
        class="form-control mb-3"
        placeholder="Search by patient name..."
      />

      <table class="table table-hover shadow-sm">
        <thead style="background-color: #1a73e8; color: white">
          <tr>
            <th>Patient</th>
            <th>Date</th>
            <th>Doctor</th>
            <th>Reason</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="appointments-table-body"></tbody>
      </table>
    </div>

    <div class="modal fade" id="bookModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Book Appointment</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input
              type="text"
              id="patientSearch"
              class="form-control mb-2"
              placeholder="Search patient by name..."
            />
            <div id="patientResults" class="list-group mb-3"></div>
            <input type="hidden" id="selectedPatientId" />

            <input
              type="datetime-local"
              id="appointmentDate"
              class="form-control mb-2"
            />

            <input
              type="text"
              id="doctorName"
              class="form-control mb-2"
              placeholder="Doctor name"
            />

            <input
              type="text"
              id="reason"
              class="form-control mb-2"
              placeholder="Reason for visit"
            />
          </div>

          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button type="button" class="btn btn-success" id="confirmBookBtn">
              Confirm
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Edit Appointment</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="editPatientId" />
            <input type="hidden" id="editAppointmentId" />

            <input
              type="datetime-local"
              id="editDate"
              class="form-control mb-2"
            />
            <input
              type="text"
              id="editDoctor"
              class="form-control mb-2"
              placeholder="Doctor name"
            />
            <input
              type="text"
              id="editReason"
              class="form-control mb-2"
              placeholder="Reason"
            />
            <select id="editStatus" class="form-control mb-2">
              <option value="Scheduled">Scheduled</option>
              <option value="Completed">Completed</option>
              <option value="Cancelled">Cancelled</option>
            </select>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button type="button" class="btn btn-primary" id="saveEditBtn">
              Save
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/static/js/appointments.js"></script>
  </body>
</html>
