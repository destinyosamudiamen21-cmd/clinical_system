<!DOCTYPE html>
<html lang="en">
  <head>
    <style>
      body {
        background-color: #f4f6fb;
      }

      .card.shadow-sm {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        border-radius: 12px;
      }
      .card.shadow-sm:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08) !important;
      }
      .quote-banner {
        margin-top: 24px;
        padding: 16px;
        border-radius: 8px;
        background: #f1f5fb;
        opacity: 1;
        transition: opacity 0.6s ease-in-out;
      }
      .quote-banner.fade-out {
        opacity: 0;
      }
      .quote-text {
        font-style: italic;
        font-size: 16px;
      }
      .quote-author {
        font-size: 13px;
        color: #555;
      }
    </style>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo clinic</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="icon" href="data:," />
  </head>
  <body>
    <!-- NAVBAR -->
    <div
      class="card border-0 shadow-sm mb-4"
      style="background: linear-gradient(135deg, #0d6efd, #5b9bff)"
    >
      <div
        class="card-body d-flex justify-content-between align-items-center py-4 text-white"
      >
        <div>
          <h6 class="mb-1 opacity-75">Welcome back</h6>
          <h3 class="fw-bold mb-0">Demo Clinic</h3>
        </div>
        <i
          class="bi bi-heart-pulse-fill"
          style="font-size: 48px; opacity: 0.85"
        ></i>
      </div>
    </div>

    <!-- <nav class="navbar navbar-dark bg-primary px-4">
      <span class="navbar-brand fw-bold">Restore Medical Center</span>
    </nav> -->

    <!-- Main CONTENT -->
    <div class="container mt-4">
      <!-- STAT CARDS -->
      <div class="row g-3">
        <div class="col-md-4">
          <div
            class="card shadow-sm border-0"
            style="border-left: 4px solid #0d6efd !important"
          >
            <div
              class="card-body d-flex justify-content-between align-items-center"
            >
              <div>
                <h6 class="text-muted mb-1">Total Patients</h6>
                <h2 class="fw-bold mb-0" id="total-patients">—</h2>
              </div>
              <div class="rounded-circle bg-primary bg-opacity-10 p-3">
                <i class="bi bi-people-fill fs-4 text-primary"></i>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div
            class="card shadow-sm border-0"
            style="border-left: 4px solid #198754 !important"
          >
            <div
              class="card-body d-flex justify-content-between align-items-center"
            >
              <div>
                <h6 class="text-muted mb-1">Today's Appointments</h6>
                <h2 class="fw-bold mb-0" id="todays-appointments">—</h2>
              </div>
              <div class="rounded-circle bg-success bg-opacity-10 p-3">
                <i class="bi bi-calendar-check-fill fs-4 text-success"></i>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div
            class="card shadow-sm border-0"
            style="border-left: 4px solid #fd7e14 !important"
          >
            <div
              class="card-body d-flex justify-content-between align-items-center"
            >
              <div>
                <h6 class="text-muted mb-1">Total Appointments</h6>
                <h2 class="fw-bold mb-0" id="total-appointments">—</h2>
              </div>
              <div class="rounded-circle bg-warning bg-opacity-10 p-3">
                <i class="bi bi-clipboard2-pulse-fill fs-4 text-warning"></i>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- QUICK ACTIONS -->
      <div class="mt-4">
        <h5 class="mb-3">Quick Actions</h5>
        <a href="/patients" class="btn btn-primary btn-lg me-2"
          ><i class="bi bi-person-plus-fill me-2"></i>Register Patient</a
        >
        <a href="/appointments" class="btn btn-success btn-lg"
          ><i class="bi bi-calendar-plus-fill me-2"></i>Book Appointments</a
        >
      </div>
    </div>
    <!-- /Quick Actions div closes here -->

    <div id="quote-banner" class="quote-banner">
      <p id="quote-text" class="quote-text"></p>
      <span id="quote-author" class="quote-author"></span>
    </div>
   

    <div class="row mt-4 mb-4">
      <div class="col-md-6">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h6 class="text-muted mb-0" id="calendarTitle"></h6>
              <div>
                <button
                  class="btn btn-sm btn-outline-primary me-1"
                  onclick="changeMonth(-1)"
                >
                  &#8249;
                </button>
                <button
                  class="btn btn-sm btn-outline-primary"
                  onclick="changeMonth(1)"
                >
                  &#8250;
                </button>
              </div>
            </div>
            <div id="calendarGrid"></div>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div
          class="card shadow-sm border-0"
          style="
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
          "
        >
          <div class="card-body">
            <h6 class="mb-1 opacity-75">Monthly Overview</h6>
            <h2 id="monthlyCount" class="fw-bold">0</h2>
            <p class="opacity-75">appointments this month</p>
            <div id="monthlyList"></div>
          </div>
        </div>
      </div>
    </div>

     <div class="card shadow-sm border-0 mt-4"></div>
      <div class="card-body">
        <h6 class="text-muted mb-3">Patients vs Appointments</h6>
        <div style="height: 250px">
          <canvas id="statsChart"></canvas>
        </div>
      </div>
    </div>

    <!-- bootstraps JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="/static/js/dashboard.js"></script>
  </body>
</html>
