<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patients - Restore Medical center</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      table {
        table-layout: fixed;
        width: 100%;
      }
      tb,
      th {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-primary px-4">
      <span class="navbar-brand fw-bold">Demo clinic</span>
      <a href="/" class="btn btn-outline-light btn-sm">dashboard</a>
    </nav>

    <div class="container mt-4">
      <div class="row mb-5">
        <div class="col-12">
          <div class="card bg-primary text-white position-relative border-0 shadow" style="border-radius: 16px; min-height: 130px; margin-top: 40px;">
            <div class="card-body p-4" style="margin-left: 180px;">
              <h4 class="fw-bold">Hi </h4>
              <p class="mb-0 text-light">Find a Doctor and make an appointment online!</p>
            </div>
            <img src="/static/images/IMG_5258.JPG" alt="Doctor" class="position-absolute bottom-0 start-0" style="height: 170px; z-index: 10; margin-left: 20px;">
          </div>
        </div>
      </div>

    <div class="container mt-4">
      <!-- PAGE HEADER -->
      <div class="d-flex justify-content-between align-item-center mb-3">
        <h4 class="fw-bold">Patients</h4>
        <button class="btn btn-primary" id="registerBtn">
          Register Patient
        </button>
      </div>

      <!-- SEARCH BAR -->
      <input
        type="text"
        id="searchInput"
        class="form-control mb-3"
        placeholder="Search patient by name..."
      />

      <!-- PATIENT TABLE -->
      <table class="table table-hover">
        <thead class="table-primary">
          <tr>
            <th>ID</th>
            <th>Full Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Phone</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="patientsTableBody"></tbody>
      </table>

      <!-- REGISTER PATIENT MODAL -->
      <div class="modal fade" id="registerModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Register New Patient</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label"> Full Name </label>
                  <input type="text" class="form-control" id="reg_full_name" required />
                </div>
                <div class="col-md-3">
                  <label class="form-label"> Age </label>
                  <input type="number" class="form-control" id="reg_age" required />
                </div>
                <div class="col-md-3">
                  <label class="form-label"> Gender </label>
                  <select class="form-select" id="reg_gender">
                    <option value="">Select</option>
                    <option>Male</option>
                    <option>Female</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label"> Phone Number </label>
                  <input type="text" class="form-control" id="reg_phone" />
                </div>
                <div class="col-md-6">
                  <label class="form-label"> Address </label>
                  <input type="text" class="form-control" id="reg_address" />
                </div>
                <div class="col-md-6">
                  <label class="form-label"> Nationality </label>
                  <input type="text" class="form-control" id="reg_nationality" />
                </div>
                <div class="col-md-6">
                  <label class="form-label"> Tribe </label>
                  <input type="text" class="form-control" id="reg_tribe" />
                </div>
                <div class="col-md-6">
                  <label class="form-label"> Occupation </label>
                  <input type="text" class="form-control" id="reg_occupation" />
                </div>
                <div class="col-md-6">
                  <label class="form-label"> Marital Status </label>
                  <select class="form-select" id="reg_marital_status">
                    <option value="">Select</option>
                    <option>Single</option>
                    <option>Married</option>
                    <option>Divorced</option>
                    <option>Widowed</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label"> Next Of Kin </label>
                  <input type="text" class="form-control" id="reg_next_of_kin" />
                </div>
              </div>
            </div>

            <div class="col-md-12">
              <label for="form-label">Diagnosis</label>
              <input type="text" class="form-control" id="reg_diagnosis" placeholder="Optional -can be added later" />
            </div>

            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
              <button type="button" class="btn btn-primary" id="submitRegister">Register Patient</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- VIEW PATIENT MODAL -->
    <div class="modal fade" id="viewPatientModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">Patient Details</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body" id="viewPatientBody">
            <!-- JS will inject content here -->
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <!-- NEW: Clinical Records button -->
            <button type="button" class="btn btn-info" id="clinicalRecordsBtn">Clinical Records</button>
            <button type="button" class="btn btn-primary" id="editFromViewBtn">Edit Patient</button>
          </div>
        </div>
      </div>
    </div>

    <!-- EDIT PATIENT MODAL -->
    <div class="modal fade" id="editPatientModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header bg-success text-white">
            <h5 class="modal-title">Edit Patient</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="editPatientId">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="edit_full_name">
              </div>
              <div class="col-md-3">
                <label class="form-label">Age</label>
                <input type="number" class="form-control" id="edit_age">
              </div>
              <div class="col-md-3">
                <label class="form-label">Gender</label>
                <select class="form-select" id="edit_gender">
                  <option>Male</option>
                  <option>Female</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-control" id="edit_phone_number">
              </div>
              <div class="col-md-6">
                <label class="form-label">Address</label>
                <input type="text" class="form-control" id="edit_address">
              </div>
              <div class="col-md-6">
                <label class="form-label">Nationality</label>
                <input type="text" class="form-control" id="edit_nationality">
              </div>
              <div class="col-md-6">
                <label class="form-label">Tribe</label>
                <input type="text" class="form-control" id="edit_tribe">
              </div>
              <div class="col-md-6">
                <label class="form-label">Occupation</label>
                <input type="text" class="form-control" id="edit_occupation">
              </div>
              <div class="col-md-6">
                <label class="form-label">Marital Status</label>
                <select class="form-select" id="edit_marital_status">
                  <option>Single</option>
                  <option>Married</option>
                  <option>Divorced</option>
                  <option>Widowed</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Next of Kin</label>
                <input type="text" class="form-control" id="edit_next_of_kin">
              </div>
              <div class="col-12">
                <label class="form-label">Diagnosis</label>
                <textarea class="form-control" id="edit_diagnosis" rows="3"></textarea>
              </div>
            </div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-success" id="saveEditBtn">Save Changes</button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/patients.js"></script>
  </body>
</html>
