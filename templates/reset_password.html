<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="icon" href="data:," />
  </head>
  <body class="bg-light">
    <div class="container" style="max-width: 420px; margin-top: 80px">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h4 class="fw-bold mb-1">Set a new password</h4>
          <p class="text-muted small mb-4">Enter your new password below.</p>
          <div id="msg" class="alert d-none"></div>
          <div class="mb-3">
            <label class="form-label small">New Password</label>
            <input type="password" class="form-control" id="newPassword" />
          </div>
          <div class="mb-3">
            <label class="form-label small">Confirm Password</label>
            <input type="password" class="form-control" id="confirmPassword" />
          </div>
          <button class="btn btn-primary w-100" id="resetBtn">
            Reset Password
          </button>
          <p class="text-center mt-3 mb-0">
            <a href="/login" class="small">Back to login</a>
          </p>
        </div>
      </div>
    </div>
    <script src="/static/js/reset_password.js"></script>
  </body>
</html>
